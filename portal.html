<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luka - Portal da Consultora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Estilos específicos do Portal */
    .portal-layout {
      display: flex;
      min-height: 100vh;
    }
    
    #sidebar {
      width: 260px;
      background: var(--ivory);
      border-right: 1px solid var(--line);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }
    
    .nav-group {
      margin-bottom: 1.5rem;
    }
    
    .nav-group-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      background: none;
      border-radius: var(--radius-sm);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    
    .nav-item:hover {
      background: var(--sand);
    }
    
    .nav-item.active {
      background: var(--camel-soft);
      color: var(--camel-dark);
      font-weight: 500;
    }
    
    .nav-item i {
      width: 18px;
      height: 18px;
    }
    
    #main {
      flex: 1;
      margin-left: 260px;
      padding: 2rem 3rem;
      background: var(--cream);
    }
    
    .portal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    
    .portal-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .portal-brand-logo {
      width: 40px;
      height: 40px;
      background: var(--camel);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 1.25rem;
      color: var(--ivory);
      font-weight: 600;
    }
    
    .portal-user {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .portal-user-avatar {
      width: 40px;
      height: 40px;
      background: var(--camel-soft);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--camel-dark);
    }
  </style>
</head>
<body>
  <div class="portal-layout">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="portal-brand mb-6">
        <div class="portal-brand-logo">L</div>
        <div>
          <h3 style="margin: 0; font-size: 1.1rem;">Luka</h3>
          <p class="text-muted" style="font-size: 0.75rem; margin: 0;">Portal da Consultora</p>
        </div>
      </div>
      
      <button onclick="window.location.href='index.html'" class="nav-item mb-4" style="background: var(--sand);">
        <i data-lucide="layout-grid"></i>
        <span>Voltar ao Hub</span>
      </button>
      
      <!-- Navegação será renderizada via JS -->
    </aside>
    
    <!-- Main Content -->
    <main id="main">
      <div class="portal-header">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle" class="text-muted">Visão geral do seu negócio</p>
        </div>
        <div class="portal-user">
          <div class="text-right">
            <p style="font-weight: 500;">Jayne Almeida</p>
            <p class="text-muted" style="font-size: 0.8rem;">Personal Stylist</p>
          </div>
          <div class="portal-user-avatar">JA</div>
        </div>
      </div>
      
      <div id="mainContent">
        <!-- Conteúdo será renderizado via JS -->
      </div>
    </main>
  </div>
  
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
